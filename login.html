<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Lost & Found Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      background: #fff;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
      width: 320px;
    }
    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #006A4E;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
    .login-box button.btn-primary {
      width: 100%;
      padding: 10px;
      background: #006A4E;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 5px;
    }
    .login-box button.btn-primary:hover {
      background: #004d36;
    }
    .toggle-link {
      text-align: center;
      margin-top: 14px;
      font-size: 14px;
      color: #555;
    }
    .toggle-link span {
      color: #006A4E;
      cursor: pointer;
      font-weight: bold;
      text-decoration: underline;
    }
    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2 id="formTitle">myUNT Login</h2>

    <!-- Login Form -->
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="Gmail address" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm" class="hidden">
      <input type="text" id="signupName" placeholder="Full Name" required>
      <input type="email" id="signupEmail" placeholder="Gmail address" required>
      <input type="password" id="signupPassword" placeholder="Password" required>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>

    <p id="errorMessage" class="error"></p>

    <div class="toggle-link" id="toggleText">
      Don't have an account? <span id="toggleBtn">Sign Up</span>
    </div>
  </div>

  <script src="./js/common.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
