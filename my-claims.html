<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Claims - Lost &amp; Found</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    main {
      padding: 24px 40px;
      max-width: 900px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    /* ---- Claims list ---- */
    .my-claims-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 20px;
    }

    .my-claim-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-left: 5px solid #1e5faf;
      border-radius: 12px;
      padding: 18px 22px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .my-claim-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(30, 95, 175, 0.12);
    }
    .my-claim-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
    }
    .my-claim-card .card-meta {
      font-size: 13px;
      color: #6b7280;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }
    .card-status {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .card-status.pending  { background: #fef3c7; color: #b45309; }
    .card-status.approved { background: #dcfce7; color: #166534; }
    .card-status.rejected { background: #fee2e2; color: #991b1b; }

    /* ---- Search bar ---- */
    .search-bar {
      width: 100%;
      padding: 10px 16px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .search-bar:focus { border-color: #1e5faf; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    .empty-state i { font-size: 42px; display: block; margin-bottom: 14px; }

    /* ---- Claim detail + chat modal ---- */
    .mc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1100;
      align-items: center;
      justify-content: center;
    }
    .mc-overlay.open { display: flex; }

    .mc-modal {
      background: #fff;
      border-radius: 16px;
      width: 90%;
      max-width: 580px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .mc-close {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #6b7280;
      z-index: 10;
    }
    .mc-close:hover { color: #111; }

    .mc-img-wrap {
      width: 100%;
      max-height: 240px;
      overflow: hidden;
      border-radius: 16px 16px 0 0;
    }
    .mc-img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      display: block;
    }
    .mc-img-placeholder {
      width: 100%;
      height: 140px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 14px;
      border-radius: 16px 16px 0 0;
    }

    .mc-body {
      padding: 20px 24px 10px;
    }
    .mc-body h2 {
      margin: 0 0 12px;
      font-size: 20px;
      color: #111827;
    }
    .mc-details {
      font-size: 13px;
      color: #374151;
      line-height: 1.7;
      margin-bottom: 14px;
    }
    .mc-details strong { color: #111827; }

    /* ---- Chat ---- */
    .chat-section {
      padding: 0 24px 24px;
    }
    .chat-section h4 {
      margin: 0 0 10px;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .chat-box {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .chat-msg { display: flex; flex-direction: column; max-width: 72%; }
    .chat-msg--admin   { align-self: flex-start; align-items: flex-start; }
    .chat-msg--student { align-self: flex-end;   align-items: flex-end;   }
    .chat-sender { font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 2px; }
    .chat-bubble {
      padding: 9px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .chat-msg--admin   .chat-bubble { background: #f1f1f1; color: #333; border-bottom-left-radius: 4px; }
    .chat-msg--student .chat-bubble { background: #1e5faf; color: #fff; border-bottom-right-radius: 4px; }
    .chat-time { font-size: 10px; color: #c0c0c0; margin-top: 2px; }
    .chat-input-row { display: flex; gap: 8px; }
    .chat-input {
      flex: 1;
      padding: 9px 13px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: #1e5faf; }
    .chat-input:disabled { background: #f3f4f6; }
    .chat-send-btn {
      background: #1e5faf;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-send-btn:hover { background: #0f4c81; }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Campus Lost &amp; Found</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a> |
      <a href="report.html">Report Item</a> |
      <a href="claim.html">Claim</a> |
      <a href="student-messages.html">Conversations</a>
    </nav>

    <!-- Role Switch -->
    <select id="roleSwitch" class="role-select">
      <option value="student">Student</option>
      <option value="admin">Admin</option>
    </select>

    <!-- Profile Dropdown -->
    <div class="profile-menu">
      <img src="assets/profile.png" alt="Profile" class="avatar" id="profileAvatar">
      <div class="dropdown" id="profileDropdown">
        <a href="profile.html">Details</a>
        <a href="#" id="logoutBtn">Logout</a>
      </div>
    </div>
  </header>

  <main>
    <h2>My Claims</h2>

    <input
      type="text"
      id="claimSearch"
      class="search-bar"
      placeholder="Search by item name or location…"
      style="margin-bottom: 16px;"
    />

    <div id="claimsList" class="my-claims-list">
      <p style="text-align:center;color:#888;">Loading…</p>
    </div>
  </main>

  <footer>
    <p>© 2025 Lost &amp; Found</p>
  </footer>

  <!-- Claim detail + chat modal -->
  <div id="mcOverlay" class="mc-overlay" role="dialog" aria-modal="true">
    <div class="mc-modal">
      <button class="mc-close" id="mcClose" aria-label="Close">&times;</button>
      <div id="mcImgWrap"></div>
      <div class="mc-body">
        <h2 id="mcTitle"></h2>
        <div id="mcDetails" class="mc-details"></div>
      </div>
      <hr style="border:none;border-top:1px solid #f3f4f6;margin:0 24px;">
      <div class="chat-section">
        <h4><i class="fas fa-comments" style="margin-right:6px;"></i>Messages</h4>
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="studentMsgInput" class="chat-input" placeholder="Type a message to admin…" />
          <button class="chat-send-btn" id="studentSendBtn">
            <i class="fas fa-paper-plane"></i> Send
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/userContext.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/my-claims.js"></script>
</body>
</html>
