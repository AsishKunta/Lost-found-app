<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filing a Claim - Lost & Found</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Campus Lost & Found</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a> |
      <a href="report.html">Report Item</a> |
      <a href="claim.html" class="active">Claim</a> |
      <a href="student-messages.html">Conversations</a>
    </nav>

    <!-- Role Switch -->
    <select id="roleSwitch" class="role-select">
      <option value="student">Student</option>
      <option value="admin">Admin</option>
    </select>

    <!-- Profile Dropdown -->
    <div class="profile-menu">
      <div class="avatar-wrapper" id="profileAvatar">
        <div class="avatar-gradient">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="avatar-role-label" id="avatarRoleLabel">Student</span>
      </div>
      <div class="dropdown" id="profileDropdown">
        <a href="profile.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile
        </a>
        <a href="#" id="logoutBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
      </div>
    </div>
  </header>

  <!-- Main Section -->
  <main>
    <div class="claim-card">
      <h2>Filing a Claim</h2>
      <form id="claimForm" class="report-form" enctype="multipart/form-data">
        <div class="form-row">
          <label for="studentId">Student ID</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-id-card input-icon"></i>
            <input type="text" id="studentId" placeholder="Enter student ID" required>
          </div>
        </div>

        <div class="form-row">
          <label for="studentEmail">Student Email</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-envelope input-icon"></i>
            <input type="email" id="studentEmail" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-row">
          <label for="itemName">Item Name</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-tag input-icon"></i>
            <input type="text" id="itemName" placeholder="Enter item name" required>
          </div>
        </div>

        <div class="form-row">
          <label for="location">Location</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-location-dot input-icon"></i>
            <input type="text" id="location" placeholder="Where did you lose it?" required>
          </div>
        </div>

        <div class="form-row">
          <label for="description">Description</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-align-left input-icon"></i>
            <textarea id="description" rows="5" placeholder="Describe your claim" required></textarea>
          </div>
        </div>

        <div class="form-row">
          <label for="fileUpload">Upload image (optional)</label>
          <div class="file-upload-wrapper" id="fileUploadWrapper">
            <input type="file" id="claimImage" accept="image/*" hidden>
            <div class="file-upload-content">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <div>
                <div class="file-upload-title">Upload image (optional)</div>
                <div class="file-upload-subtitle">PNG, JPG, GIF up to 5MB</div>
              </div>
            </div>
            <div class="file-name" id="fileName">No file selected</div>
          </div>
          <img id="claimPreview" src="" alt="Preview"
               style="display:none; width:100%; max-height:200px; object-fit:cover; margin-top:10px; border-radius:8px;" />
        </div>

        <div class="submit-container">
          <button type="submit" class="submit-btn">
            <span class="button-loader" aria-hidden="true"></span>
            <span class="button-text">Submit Claim →</span>
          </button>
        </div>
      </form>

      <p id="statusMessage" class="status-message"></p>
    </div>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <!-- Footer -->
  <footer>
    <p>© 2025 Lost & Found</p>
  </footer>

  <!-- Scripts -->
  <!-- Supabase JS client (for Storage upload) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/userContext.js"></script>
  <script src="./js/common.js" defer></script>
  <script src="./js/claim.js" defer></script>
</body>
</html>
