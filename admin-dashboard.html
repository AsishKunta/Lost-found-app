<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - Lost & Found</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    .admin-badge {
      font-size: 0.55em;
      font-weight: 400;
      color: #90a4ae;
      letter-spacing: 0.04em;
      margin-left: 8px;
      vertical-align: middle;
    }

    .admin-subtitle {
      font-size: 0.78rem;
      color: #90a4ae;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-top: 2px;
      margin-bottom: 0;
    }
    /* ── Sidebar shell ── */
    body { display:flex; height:100vh; overflow:hidden; background:#f1f5f9; margin:0; }
    .sidebar { width:240px; min-width:240px; background:linear-gradient(180deg,#001F3F 0%,#003f7a 55%,#0074D9 100%); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; overflow-y:auto; z-index:100; }
    .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
    .sidebar-brand h2 { color:#fff; font-size:16px; font-weight:700; margin:0 0 2px; letter-spacing:.03em; }
    .sidebar-brand p  { color:rgba(255,255,255,.5); font-size:11px; margin:0; text-transform:uppercase; letter-spacing:.08em; }
    .sidebar-nav { flex:1; padding:16px 0; list-style:none; margin:0; }
    .sidebar-nav-link { display:flex; align-items:center; gap:12px; padding:11px 22px; color:rgba(255,255,255,.72); text-decoration:none; font-size:13.5px; font-weight:500; border-left:3px solid transparent; transition:all .18s ease; }
    .sidebar-nav-link i { width:18px; text-align:center; font-size:14px; }
    .sidebar-nav-link:hover  { color:#fff; background:rgba(255,255,255,.08); border-left-color:rgba(255,255,255,.4); }
    .sidebar-nav-link.active { color:#fff; background:rgba(255,255,255,.14); border-left-color:#60a5fa; font-weight:700; }
    .sidebar-footer { margin-top:auto; padding:16px; border-top:1px solid rgba(255,255,255,.1); }
    .sidebar-role-select {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      background:linear-gradient(135deg, #2563eb, #1d4ed8);
      color:white;
      font-weight:600;
      cursor:pointer;
    }
    .sidebar-role-select option { background:#001F3F; color:#fff; }
    .page-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .page-scroll-area { flex:1; overflow-y:auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:#fff; border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:50; gap:16px; flex-shrink:0; }
    .topbar-title { font-size:18px; font-weight:700; color:#0f172a; }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .topbar .profile-menu { position:relative; }
    main { padding:20px 28px 60px; max-width:none; }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Lost &amp; Found</h2>
      <p>Admin Portal</p>
    </div>
    <ul class="sidebar-nav">
      <li><a class="sidebar-nav-link active" href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a class="sidebar-nav-link" href="admin-claims.html"><i class="fas fa-clipboard-list"></i> Claim Requests</a></li>
      <li><a class="sidebar-nav-link" href="admin-messages.html"><i class="fas fa-comments"></i> Messages</a></li>
    </ul>
    <div class="sidebar-footer">
      <select id="roleSwitch" class="sidebar-role-select">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>
    </div>
  </aside>

  <!-- Page Content -->
  <div class="page-content">
    <div class="topbar">
      <span class="topbar-title">Dashboard</span>
      <div class="topbar-right">
        <div class="profile-menu">
          <div class="avatar-wrapper" id="profileAvatar">
            <div class="avatar-gradient">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span class="avatar-role-label" id="avatarRoleLabel">Admin</span>
          </div>
          <div class="dropdown" id="profileDropdown">
            <a href="profile.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              My Profile
            </a>
            <a href="#" id="logoutBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </a>
          </div>
        </div>
      </div>
    </div>
    <div class="page-scroll-area">

  <!-- Main Section -->
  <main>
    <h2>Lost &amp; Found Dashboard</h2>
    <p class="admin-subtitle">Admin Dashboard View</p>

    <!-- Statistics Section -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-title">Total Reports</div>
        <div class="stat-number">0</div>
        <div class="stat-trend positive">+5 this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Items Claimed</div>
        <div class="stat-number">0</div>
        <div class="stat-trend negative">-2 today</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Pending Claims</div>
        <div class="stat-number">0</div>
        <div class="stat-trend positive">+3 this week</div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
      <div class="search-bar-wrapper">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="globalSearch" class="search-input search-bar"
               placeholder="Search by item name or location..." autocomplete="off" />
        <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" style="display:none">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Category Chips -->
    <div class="category-chips" id="categoryChips">
      <button class="chip active" data-category="">All</button>
      <button class="chip" data-category="Lost">Lost</button>
      <button class="chip" data-category="Found">Found</button>
      <button class="chip" data-category="Bags">Bags</button>
      <button class="chip" data-category="Electronics">Electronics</button>
      <button class="chip" data-category="Clothing">Clothing</button>
      <button class="chip" data-category="Bottles">Bottles</button>
      <button class="chip" data-category="Accessories">Accessories</button>
      <button class="chip" data-category="Other">Other</button>
    </div>

    <!-- Status Tabs -->
    <div class="status-tabs" id="statusTabs">
      <button class="status-tab active" data-status="">All Status</button>
      <button class="status-tab" data-status="pending">Pending</button>
      <button class="status-tab" data-status="claimed">Claimed</button>
    </div>

    <!-- Report Cards Grid -->
    <div id="reportCards" class="report-cards-grid">
      <!-- Cards inserted by JS -->
    </div>
  </main>

  <!-- Detail Modal (Popup) -->
  <div id="detailModal" class="modal">
    <div class="modal-content detail-modal">
      <button id="closeDetailBtn" class="cancel-btn" style="align-self: flex-end;">&times;</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2025 Lost &amp; Found</p>
  </footer>

    </div><!-- /page-scroll-area -->
  </div><!-- /page-content -->

  <!-- Scripts -->
  <script src="./js/userContext.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/admin-dashboard.js"></script>
</body>

</html>
