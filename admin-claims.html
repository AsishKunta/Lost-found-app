<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claim Requests - Admin</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ---- Admin badge (shared with admin-dashboard) ---- */
    .admin-badge {
      font-size: 0.55em;
      font-weight: 400;
      color: #90a4ae;
      letter-spacing: 0.04em;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* ---- Full-width main layout ---- */
    main {
      padding: 20px 40px;
      max-width: 1400px;
      width: 100%;
      box-sizing: border-box;
      margin: 0 auto;
    }

    @media (min-width: 1200px) {
      main { max-width: 1400px; }
    }

    /* ---- Claim cards list ---- */
    .claims-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 20px;
      padding-bottom: 70px;
      width: 100%;
    }

    /* ---- Individual claim card ---- */
    .claim-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-left: 6px solid #1e5faf;
      border-radius: 14px;
      overflow: hidden;          /* clips image to rounded corners */
      padding: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* inner content area — has original padding */
    .claim-body {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 22px 24px;
    }

    .claim-card:hover {
      transform: translateY(-3px);
      transition: 0.2s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    /* top row: item title + status badge */
    .claim-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .claim-item-name {
      font-size: 17px;
      font-weight: 700;
      color: #111827;
      margin: 0;
    }

    .claim-item-meta {
      font-size: 13px;
      color: #6b7280;
      margin-top: 3px;
    }

    /* ---- Status badges ---- */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge-pending  { background: #fef3c7; color: #b45309; border: 1px solid #f59e0b; }
    .badge-approved { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .badge-rejected { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ---- Divider line ---- */
    .claim-divider {
      border: none;
      border-top: 1px solid #f3f4f6;
      margin: 0;
    }

    /* ---- Student info row ---- */
    .claim-student {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: #374151;
    }

    .claim-student i {
      color: #0074D9;
      width: 16px;
    }

    /* ---- Claim description ---- */
    .claim-description {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.55;
    }

    /* ---- Image preview ---- */
    .claim-image {
      max-width: 260px;
      max-height: 180px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid #e5e7eb;
    }

    /* ---- Action buttons row ---- */
    .claim-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-approve {
      background: #10b981;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-approve:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-reject {
      background: #ef4444;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-reject:hover {
      background: #dc2626;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    /* ---- Empty state ---- */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      display: block;
    }

    .empty-state p {
      font-size: 16px;
      font-weight: 500;
    }

    /* ---- Message modal overlay ---- */
    .msg-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .msg-overlay.open {
      display: flex;
    }

    .msg-modal {
      background: #ffffff;
      border-radius: 14px;
      padding: 28px 30px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-modal h3 {
      margin: 0;
      font-size: 16px;
      color: #111827;
    }

    .msg-modal .msg-to {
      font-size: 13px;
      color: #6b7280;
      margin: 0;
    }

    .msg-modal .msg-to span {
      font-weight: 600;
      color: #0074D9;
    }

    .msg-modal textarea {
      width: 100%;
      min-height: 110px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }

    .msg-modal textarea:focus {
      border-color: #0074D9;
    }

    .msg-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-msg {
      background: #0074D9;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-msg:hover { background: #005bb5; }

    .btn-cancel-msg {
      background: #f3f4f6;
      color: #374151;
      border: none;
      border-radius: 8px;
      padding: 8px 22px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-cancel-msg:hover { background: #e5e7eb; }

    /* ---- Message Student button in card ---- */
    .btn-message {
      background: white;
      color: #1e5faf;
      border: 2px solid #1e5faf;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-message:hover {
      background: linear-gradient(135deg, #1e5faf, #0f4c81);
      color: white;
      border-color: transparent;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 95, 175, 0.3);
    }

    /* ---- Search bar ---- */
    .search-bar {
      width: 100%;
      padding: 11px 16px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      outline: none;
      box-sizing: border-box;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 4px;
    }
    .search-bar:focus {
      border-color: #1e5faf;
      box-shadow: 0 0 0 3px rgba(30, 95, 175, 0.12);
    }

    /* ---- New card parts ---- */
    .claim-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin: 0 0 6px;
    }
    .claim-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 13px;
      color: #374151;
      margin-bottom: 8px;
    }
    .claim-meta p { margin: 0; }
    .claim-meta strong { color: #111827; }
    .claim-desc {
      color: #555;
      font-size: 14px;
      margin: 8px 0 12px;
      line-height: 1.4;
    }
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .actions .msg-btn {
      background: white;
      color: #1e5faf;
      border: 2px solid #1e5faf;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .actions .msg-btn:hover {
      background: linear-gradient(135deg, #1e5faf, #0f4c81);
      color: white;
      border-color: transparent;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 95, 175, 0.3);
    }
    .actions .approve {
      background: #10b981; color: #fff; border: none;
      border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .actions .approve:hover {
      background: #059669; transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16,185,129,0.3);
    }
    .actions .reject {
      background: #ef4444; color: #fff; border: none;
      border-radius: 8px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    .actions .reject:hover {
      background: #dc2626; transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(239,68,68,0.3);
    }

    /* ---- Status badge variants (single-dash) ---- */
    .rc-badge-pending  { background: rgba(243,244,246,0.95); color: #b45309; }
    .rc-badge-approved { background: rgba(220,252,231,0.95); color: #166534; }
    .rc-badge-rejected { background: rgba(254,226,226,0.95); color: #991b1b; }

    /* ---- Claim detail modal ---- */
    .claim-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1100;
      align-items: center;
      justify-content: center;
    }
    .claim-modal-overlay.open { display: flex; }
    .claim-modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 0;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      position: relative;
    }
    .modal-img-wrap {
      width: 100%;
      max-height: 320px;
      overflow: hidden;
      border-radius: 16px 16px 0 0;
    }
    .modal-img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 16px 16px 0 0;
      display: block;
    }
    #modalImagePlaceholder {
      width: 100%;
      height: 180px;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 14px;
      border-radius: 16px 16px 0 0;
    }
    .claim-modal-body {
      padding: 22px 26px 26px;
    }
    .claim-modal-body h2 {
      margin: 0 0 14px;
      font-size: 20px;
      color: #111827;
    }
    .claim-modal-body .modal-details {
      font-size: 14px;
      color: #374151;
      line-height: 1.7;
    }
    .claim-modal-body .modal-details strong { color: #111827; }
    .modal-desc { margin: 0; }

    /* ---- Chat UI ---- */
    .chat-section {
      padding: 0 26px 26px;
    }
    .chat-section h4 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .chat-box {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 72%;
    }
    .chat-msg--admin {
      align-self: flex-end;
      align-items: flex-end;
    }
    .chat-msg--student {
      align-self: flex-start;
      align-items: flex-start;
    }
    .chat-sender {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 2px;
    }
    .chat-bubble {
      padding: 9px 14px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.45;
      word-break: break-word;
    }
    .chat-msg--admin  .chat-bubble { background: #1e5faf; color: #fff; border-bottom-right-radius: 4px; }
    .chat-msg--student .chat-bubble { background: #f1f1f1; color: #333; border-bottom-left-radius: 4px; }
    .chat-time {
      font-size: 10px;
      color: #c0c0c0;
      margin-top: 2px;
    }
    .chat-input-row {
      display: flex;
      gap: 8px;
    }
    .chat-input {
      flex: 1;
      padding: 9px 13px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: #1e5faf; }
    .chat-input:disabled { background: #f3f4f6; }
    .chat-send-btn {
      background: #1e5faf;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-send-btn:hover { background: #0f4c81; }
    #closeClaimModal {
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 10;
      background: none;
      border: none;
    }
    /* ── Sidebar shell ── */
    body { display:flex; height:100vh; overflow:hidden; background:#f1f5f9; margin:0; }
    .sidebar { width:240px; min-width:240px; background:linear-gradient(180deg,#001F3F 0%,#003f7a 55%,#0074D9 100%); display:flex; flex-direction:column; height:100vh; position:sticky; top:0; overflow-y:auto; z-index:100; }
    .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,.1); }
    .sidebar-brand h2 { color:#fff; font-size:16px; font-weight:700; margin:0 0 2px; letter-spacing:.03em; }
    .sidebar-brand p  { color:rgba(255,255,255,.5); font-size:11px; margin:0; text-transform:uppercase; letter-spacing:.08em; }
    .sidebar-nav { flex:1; padding:16px 0; list-style:none; margin:0; }
    .sidebar-nav-link { display:flex; align-items:center; gap:12px; padding:11px 22px; color:rgba(255,255,255,.72); text-decoration:none; font-size:13.5px; font-weight:500; border-left:3px solid transparent; transition:all .18s ease; }
    .sidebar-nav-link i { width:18px; text-align:center; font-size:14px; }
    .sidebar-nav-link:hover  { color:#fff; background:rgba(255,255,255,.08); border-left-color:rgba(255,255,255,.4); }
    .sidebar-nav-link.active { color:#fff; background:rgba(255,255,255,.14); border-left-color:#60a5fa; font-weight:700; }
    .sidebar-footer { margin-top:auto; padding:16px; border-top:1px solid rgba(255,255,255,.1); }
    .sidebar-role-select {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:none;
      background:linear-gradient(135deg, #2563eb, #1d4ed8);
      color:white;
      font-weight:600;
      cursor:pointer;
    }
    .sidebar-role-select option { background:#001F3F; color:#fff; }
    .page-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
    .page-scroll-area { flex:1; overflow-y:auto; }
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 28px; background:#fff; border-bottom:1px solid #e2e8f0; position:sticky; top:0; z-index:50; gap:16px; flex-shrink:0; }
    .topbar-title { font-size:18px; font-weight:700; color:#0f172a; }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .topbar .profile-menu { position:relative; }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h2>Lost &amp; Found</h2>
      <p>Admin Portal</p>
    </div>
    <ul class="sidebar-nav">
      <li><a class="sidebar-nav-link" href="admin-dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a class="sidebar-nav-link active" href="admin-claims.html"><i class="fas fa-clipboard-list"></i> Claim Requests</a></li>
      <li><a class="sidebar-nav-link" href="admin-messages.html"><i class="fas fa-comments"></i> Messages</a></li>
    </ul>
    <div class="sidebar-footer">
      <select id="roleSwitch" class="sidebar-role-select">
        <option value="student">Student</option>
        <option value="admin">Admin</option>
      </select>
    </div>
  </aside>

  <!-- Page Content -->
  <div class="page-content">
    <div class="topbar">
      <span class="topbar-title">Claim Requests</span>
      <div class="topbar-right">
        <div class="profile-menu">
          <div class="avatar-wrapper" id="profileAvatar">
            <div class="avatar-gradient">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span class="avatar-role-label" id="avatarRoleLabel">Admin</span>
          </div>
          <div class="dropdown" id="profileDropdown">
            <a href="profile.html">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              My Profile
            </a>
            <a href="#" id="logoutBtn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </a>
          </div>
        </div>
      </div>
    </div>
    <div class="page-scroll-area">

  <!-- Main -->
  <main>
    <h2>Claim Requests</h2>

    <!-- Search bar -->
    <input
      type="text"
      id="claimSearch"
      placeholder="Search by item name, student ID, or email…"
      class="search-bar"
    />

    <!-- Claims rendered here by admin-claims.js -->
    <div id="claimsList" class="claims-list">
      <!-- populated by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>© 2025 Lost &amp; Found</p>
  </footer>

    </div><!-- /page-scroll-area -->
  </div><!-- /page-content -->

  <!-- Message Student Modal (admin-only) -->
  <div id="msgOverlay" class="msg-overlay" role="dialog" aria-modal="true" aria-labelledby="msgModalTitle">
    <div class="msg-modal">
      <h3 id="msgModalTitle"><i class="fas fa-paper-plane" style="margin-right:6px;"></i>Send Message</h3>
      <p class="msg-to">To: <span id="msgRecipient"></span></p>
      <textarea id="msgTextarea" placeholder="Type your message here…"></textarea>
      <div class="msg-modal-actions">
        <button class="btn-cancel-msg" onclick="closeMessageModal()">Cancel</button>
        <button class="btn-msg" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </div>

  <!-- Claim Detail Modal -->
  <div id="claimDetailOverlay" class="claim-modal-overlay" role="dialog" aria-modal="true">
    <div class="claim-modal-box">
      <button id="closeClaimModal" aria-label="Close">&times;</button>
      <div id="modalImageWrap"></div>
      <div class="claim-modal-body">
        <h2 id="modalTitle"></h2>
        <div id="modalDetails" class="modal-details"></div>
      </div>
      <hr style="border:none;border-top:1px solid #f3f4f6;margin:0 26px;">
      <div class="chat-section">
        <h4><i class="fas fa-comments" style="margin-right:6px;"></i>Messages</h4>
        <div id="chatBox" class="chat-box"></div>
        <div class="chat-input-row">
          <input id="adminMsgInput" class="chat-input" placeholder="Type a message to the student…" />
          <button class="chat-send-btn" onclick="sendAdminMessage()">
            <i class="fas fa-paper-plane"></i> Send
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/userContext.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/admin-claims.js"></script>
</body>

</html>
