<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Lost & Found</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <!-- Header -->
  <header>
    <h1>Campus Lost & Found</h1>
    <nav>
      <a href="dashboard.html" class="active">Dashboard</a> |
      <a href="report.html">Report Item</a> |
      <a href="claim.html">Claim</a>
    </nav>

    <!-- Profile Dropdown -->
<div class="profile-menu">
  <img src="assets/profile.png" alt="Profile" class="avatar" id="profileAvatar">
  <div class="dropdown" id="profileDropdown">
    <a href="profile.html">Details</a> <!-- ✅ corrected -->
    <a href="#" onclick="logout()">Logout</a>
  </div>
</div>

  </header>

  <!-- Main Section -->
  <main>
    <h2>Lost & Found Dashboard</h2>

    <!-- Statistics Section -->
    <div class="stats-container">
      <div class="stat-card">
        <div class="stat-title">Total Reports</div>
        <div class="stat-number">0</div>
        <div class="stat-trend positive">+5 this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Items Claimed</div>
        <div class="stat-number">0</div>
        <div class="stat-trend negative">-2 today</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">Pending Claims</div>
        <div class="stat-number">0</div>
        <div class="stat-trend positive">+3 this week</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="filter-group">
        <label for="filterItem">Item</label>
        <div class="input-wrapper">
          <i class="fas fa-search icon"></i>
          <input type="text" id="filterItem" placeholder="Search by item" />
          <button type="button" class="clear-btn" onclick="clearInput('filterItem')">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="filter-group">
        <label for="filterLocation">Location</label>
        <div class="input-wrapper">
          <i class="fas fa-search icon"></i>
          <input type="text" id="filterLocation" placeholder="Search by location" />
          <button type="button" class="clear-btn" onclick="clearInput('filterLocation')">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="filter-group">
        <label for="filterDate">Date</label>
        <input type="date" id="filterDate" />
      </div>

      <div class="filter-group">
        <label for="filterStatus">Status</label>
        <select id="filterStatus">
          <option value="">All</option>
          <option value="Pending">Pending</option>
          <option value="Claimed">Claimed</option>
        </select>
      </div>
    </div>

    <!-- Submissions Table -->
    <table id="submissionsTable">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Location</th>
          <th>Date Found</th>
          <th>Claim Status</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows inserted by JS -->
      </tbody>
    </table>
  </main>

  <!-- Detail Modal (Popup) -->
  <div id="detailModal" class="modal">
    <div class="modal-content detail-modal">
      <button id="closeDetailBtn" class="cancel-btn" style="align-self: flex-end;">&times;</button>
      <div id="detailBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>© 2025 Lost & Found</p>
  </footer>

  <!-- Scripts -->
  <script src="js/common.js" defer></script>
  <script src="js/dashboard.js" defer></script>
</body>

</html>
